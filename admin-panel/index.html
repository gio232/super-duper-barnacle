<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ Панель — Swiss Center Services AG</title>
  <link rel="stylesheet" href="/admin-panel/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Login Form -->
    <div id="login-form" class="auth-panel">
      <div class="auth-card">
        <h1>🚀 Админ Панель</h1>
        <p>Swiss Center Services AG</p>

        <form id="login">
          <div class="form-group">
            <label>Имя пользователя:</label>
            <input type="text" id="username" placeholder="admin" required autocomplete="username">
          </div>

          <div class="form-group">
            <label>Пароль:</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary btn-full">Войти</button>
          <button type="button" class="btn btn-outline btn-full" style="margin-top: 8px;" onclick="showForgotPassword()">Забыл пароль?</button>
        </form>

        <div id="login-error" style="display: none; color: #d32f2f; margin-top: 16px; padding: 12px; background: #ffebee; border-radius: 4px;"></div>
      </div>
    </div>

    <!-- Forgot Password Form -->
    <div id="forgot-password-form" class="auth-panel" style="display: none;">
      <div class="auth-card">
        <h1>🔑 Восстановить пароль</h1>

        <form id="forgot-form">
          <div class="form-group">
            <label>Введи свое имя пользователя:</label>
            <input type="text" id="reset-username" placeholder="admin" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Отправить инструкции</button>
          <button type="button" class="btn btn-outline btn-full" style="margin-top: 8px;" onclick="showLoginForm()">Назад</button>
        </form>

        <div id="reset-error" style="display: none; margin-top: 16px; padding: 12px; background: #ffebee; border-radius: 4px; color: #d32f2f;"></div>
        <div id="reset-success" style="display: none; margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 4px; color: #2e7d32;"></div>
      </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" style="display: none;">
      <header class="admin-header">
        <div class="admin-header-content">
          <div>
            <h1>✍️ Админ Панель</h1>
            <p class="user-info">👤 <span id="current-user">admin</span></p>
          </div>
          <button id="logout-btn" class="btn btn-outline">Выход</button>
        </div>
      </header>

      <main class="admin-main">
        <form id="post-form" class="post-form">
          <!-- Language Selection -->
          <div class="form-group">
            <label>Язык написания:</label>
            <select id="language" required>
              <option value="ru">🇷🇺 Русский</option>
              <option value="en">🇬🇧 English</option>
              <option value="de">🇩🇪 Deutsch</option>
            </select>
            <small>Выбери язык, на котором пишешь. Остальные переводы создадутся автоматически!</small>
          </div>

          <!-- Title -->
          <div class="form-group">
            <label>Заголовок статьи:</label>
            <input type="text" id="title" placeholder="Например: Как открыть бизнес в Швейцарии" required>
          </div>

          <!-- Description -->
          <div class="form-group">
            <label>Краткое описание (для списка статей):</label>
            <textarea id="description" placeholder="1-2 предложения" rows="3"></textarea>
          </div>

          <!-- Image Upload -->
          <div class="form-group">
            <label>Изображение (превью для списка):</label>
            <div class="image-upload-wrapper">
              <input type="file" id="image-file" accept="image/*" style="display: none;">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('image-file').click()">📤 Загрузить изображение</button>
              <input type="text" id="image" placeholder="или введи URL изображения">
              <div id="image-preview" style="margin-top: 12px;"></div>
            </div>
          </div>

          <!-- Content -->
          <div class="form-group">
            <label>Содержание статьи:</label>
            <div class="markdown-toolbar">
              <button type="button" class="toolbar-btn" onclick="insertMarkdown('**', '**')" title="Жирный">
                <strong>Б</strong>
              </button>
              <button type="button" class="toolbar-btn" onclick="insertMarkdown('*', '*')" title="Курсив">
                <em>К</em>
              </button>
              <button type="button" class="toolbar-btn" onclick="insertMarkdown('\n# ', '\n')" title="Заголовок">
                H1
              </button>
              <button type="button" class="toolbar-btn" onclick="insertMarkdown('- ', '')" title="Список">
                ↳
              </button>
              <button type="button" class="toolbar-btn" onclick="insertMarkdown('[', '](url)')" title="Ссылка">
                🔗
              </button>
            </div>
            <textarea id="content" placeholder="Пиши в Markdown формате..." rows="15" required></textarea>
            <small>💡 Поддерживается Markdown: **жирный**, *курсив*, # заголовки, - списки</small>
          </div>

          <!-- Author -->
          <div class="form-group">
            <label>Автор:</label>
            <input type="text" id="author" placeholder="Swiss Center Services AG" value="Swiss Center Services AG">
          </div>

          <!-- Publish -->
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="published">
              <span>✓ Опубликовать сейчас (если не отмечено, то будет в черновиках)</span>
            </label>
          </div>

          <!-- Buttons -->
          <div class="form-actions">
            <button type="button" id="preview-btn" class="btn btn-secondary">👁️ Предпросмотр</button>
            <button type="button" id="preview-translations-btn" class="btn btn-secondary">🌐 Проверить переводы</button>
            <button type="button" id="draft-btn" class="btn btn-outline">💾 Черновик</button>
            <button type="submit" class="btn btn-primary">📤 Опубликовать</button>
          </div>
        </form>

        <!-- Posts List -->
        <div id="posts-section" class="posts-section">
          <h2>📋 Мои статьи</h2>
          <div id="posts-list" class="posts-list">
            <p>Загружаю статьи...</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <button class="modal-close" onclick="closePreview()">✕</button>
        <div id="preview-content" class="preview-content"></div>
      </div>
    </div>

    <!-- Translation Preview Modal -->
    <div id="translation-modal" class="modal" style="display: none;">
      <div class="modal-content modal-wide">
        <button class="modal-close" onclick="closeTranslationPreview()">✕</button>
        <div id="translation-preview" class="translation-preview"></div>
      </div>
    </div>
  </div>

  <script src="/admin-panel/admin.js"></script>
</body>
</html>
